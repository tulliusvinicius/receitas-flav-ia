name: Android CI (Capacitor Build & Firebase Distribution)

on:
  push:
    branches: [ main ] # Dispara o build sempre que você atualizar a main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node_modules-cache: 'npm'
        node-version: 22

    - name: Configurar Java 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin' # Sua distribuição padrão estável
        java-version: '21'

    - name: Instalar Dependências do Projeto web
      run: npm install --legacy-peer-deps

    - name: Build do Frontend (Gera os arquivos web do app)
      run: npm run build

    - name: Sincronizar código com o Capacitor
      run: npx cap sync android

    - name: Mudar permissão do Gradle Wrapper (Necessário para Linux)
      run: chmod +x android/gradlew

    - name: Compilar APK via Gradle (Modo Debug)
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Salvar o APK gerado como Artefato do GitHub
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk

# --- NOVO BLOCO DO FIREBASE APP DISTRIBUTION CORRIGIDO ---
    
    - name: Configurar Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true # Faz o cache automático dos plugins para os próximos builds sumirem em segundos!

    - name: Instalar Dependências do Fastlane (Sem interrupções)
      run: |
        gem install bundler
        bundle install

    - name: Distribuir APK via Firebase App Distribution
      env:
        FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_APP_DISTRIBUTION_CREDENTIALS }}
      run: |
        echo "$FIREBASE_CREDENTIALS" > firebase-credentials.json
        export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/firebase-credentials.json
        bundle exec fastlane android distribute